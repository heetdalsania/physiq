<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F1A">
<title>PHYSIQ ENGINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ─── THEME SYSTEM ─── */
  :root, [data-theme="dark"] {
    --bg: #0B0F1A;
    --bg-header: rgba(59,130,246,0.08);
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --surface-alt: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.05);
    --border-active: rgba(59,130,246,0.4);
    --border-faint: rgba(255,255,255,0.04);
    --track: rgba(255,255,255,0.06);
    --text: #E2E8F0;
    --text-dim: #94A3B8;
    --text-muted: #64748B;
    --text-faint: #475569;
    --text-bright: #F1F5F9;
    --text-white: #F8FAFC;
    --text-suggestion: #CBD5E1;
    --nav-bg: rgba(11,15,26,0.95);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: rgba(255,255,255,0.1);
    --water-bg: rgba(56,189,248,0.06);
    --water-border: rgba(56,189,248,0.12);
    --water-btn-bg: rgba(56,189,248,0.12);
    --water-btn-border: rgba(56,189,248,0.2);
    --water-btn-hover: rgba(56,189,248,0.25);
    --muscle-active-bg: rgba(168,85,247,0.12);
    --muscle-active-border: rgba(168,85,247,0.4);
    --muscle-tag-bg: rgba(168,85,247,0.12);
    --muscle-tag-border: rgba(168,85,247,0.25);
    --sex-active-bg: rgba(59,130,246,0.15);
    --option-active-bg: rgba(59,130,246,0.1);
    --option-active-border: rgba(59,130,246,0.3);
    --stat-border: rgba(255,255,255,0.03);
    --blue: #3B82F6; --blue-light: #60A5FA; --blue-glow: rgba(59,130,246,0.3);
    --orange: #F97316; --yellow: #EAB308; --purple: #A855F7; --purple-light: #C084FC;
    --green: #22C55E; --red: #EF4444; --pink: #F43F5E; --teal: #14B8A6;
    --cyan: #06B6D4; --sky: #38BDF8; --amber: #FBBF24; --indigo: #6366F1;
    --magenta: #D946EF; --rose: #EC4899;
    --scrollbar-thumb: rgba(255,255,255,0.1);
  }

  [data-theme="light"] {
    --bg: #F1F5F9;
    --bg-header: rgba(59,130,246,0.06);
    --surface: rgba(0,0,0,0.03);
    --surface-hover: rgba(0,0,0,0.06);
    --surface-alt: rgba(0,0,0,0.02);
    --border: rgba(0,0,0,0.08);
    --border-active: rgba(59,130,246,0.5);
    --border-faint: rgba(0,0,0,0.04);
    --track: rgba(0,0,0,0.07);
    --text: #1E293B;
    --text-dim: #475569;
    --text-muted: #64748B;
    --text-faint: #94A3B8;
    --text-bright: #0F172A;
    --text-white: #0F172A;
    --text-suggestion: #334155;
    --nav-bg: rgba(241,245,249,0.95);
    --input-bg: rgba(0,0,0,0.04);
    --input-border: rgba(0,0,0,0.12);
    --water-bg: rgba(56,189,248,0.08);
    --water-border: rgba(56,189,248,0.18);
    --water-btn-bg: rgba(56,189,248,0.1);
    --water-btn-border: rgba(56,189,248,0.25);
    --water-btn-hover: rgba(56,189,248,0.2);
    --muscle-active-bg: rgba(168,85,247,0.1);
    --muscle-active-border: rgba(168,85,247,0.35);
    --muscle-tag-bg: rgba(168,85,247,0.1);
    --muscle-tag-border: rgba(168,85,247,0.25);
    --sex-active-bg: rgba(59,130,246,0.1);
    --option-active-bg: rgba(59,130,246,0.08);
    --option-active-border: rgba(59,130,246,0.35);
    --stat-border: rgba(0,0,0,0.06);
    --blue: #2563EB; --blue-light: #3B82F6; --blue-glow: rgba(37,99,235,0.2);
    --orange: #EA580C; --yellow: #CA8A04; --purple: #9333EA; --purple-light: #A855F7;
    --green: #16A34A; --red: #DC2626; --pink: #E11D48; --teal: #0D9488;
    --cyan: #0891B2; --sky: #0284C7; --amber: #D97706; --indigo: #4F46E5;
    --magenta: #C026D3; --rose: #DB2777;
    --scrollbar-thumb: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  #app { max-width: 480px; margin: 0 auto; position: relative; padding-bottom: 80px; }

  .mono { font-family: 'Space Mono', monospace; }
  .label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 12px;
  }

  .input {
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 8px; padding: 10px 12px; color: var(--text-bright); font-size: 14px;
    font-family: 'Space Mono', monospace; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--blue); }
  .input::placeholder { color: var(--text-faint); }

  .card {
    background: var(--surface); border-radius: 12px; padding: 14px;
    border: 1px solid var(--border); transition: all 0.2s;
  }
  .card:hover { background: var(--surface-hover); }

  .btn {
    border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s; -webkit-appearance: none;
  }
  .btn-primary {
    padding: 14px; border-radius: 10px; width: 100%;
    background: linear-gradient(135deg, #3B82F6, #2563EB);
    color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    box-shadow: 0 4px 20px var(--blue-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(59,130,246,0.4); }
  .btn-primary:active { transform: translateY(0); }

  .progress-track { height: 4px; border-radius: 2px; background: var(--track); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: var(--nav-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 max(12px, env(safe-area-inset-bottom)); z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 6px 0;
    color: var(--text-faint); transition: color 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .nav-btn.active { color: var(--blue); }
  .nav-btn span:first-child { font-size: 18px; }
  .nav-btn span:last-child { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-2-10 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .flex-col { display: flex; flex-direction: column; }
  .flex-row { display: flex; align-items: center; }
  .gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .water-btn {
    flex: 1; padding: 8px 0; border-radius: 8px;
    background: var(--water-btn-bg); border: 1px solid var(--water-btn-border);
    color: var(--sky); font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .water-btn:hover { background: var(--water-btn-hover); }
  .water-btn.subtract { color: var(--red); background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
  .water-btn.subtract:hover { background: rgba(239,68,68,0.15); }

  .muscle-btn {
    padding: 16px 14px; border-radius: 12px; cursor: pointer; text-align: left;
    background: var(--surface); border: 1px solid var(--border);
    transition: all 0.2s; color: var(--text-dim); font-family: 'DM Sans', sans-serif;
  }
  .muscle-btn.active {
    background: var(--muscle-active-bg); border-color: var(--muscle-active-border); color: var(--purple-light);
  }

  .option-btn {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px;
    cursor: pointer; background: var(--surface-alt); border: 1px solid var(--border-faint);
    color: var(--text-dim); transition: all 0.2s; text-align: left; width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .option-btn.active {
    background: var(--option-active-bg); border-color: var(--option-active-border); color: var(--blue-light);
  }

  .suggestion { padding: 12px 14px; border-radius: 10px; font-size: 12px; line-height: 1.5; color: var(--text-suggestion); }

  .meal-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; background: var(--surface); border: 1px solid var(--border);
  }
  .meal-remove { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 14px; padding: 0 4px; }

  .nutrient-compact { display: flex; align-items: center; gap: 8px; padding: 6px 0; }

  .sex-btn {
    flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px;
    font-weight: 600; background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .sex-btn.active { background: var(--sex-active-bg); border-color: var(--border-active); color: var(--blue-light); }

  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--stat-border); }

  .muscle-tag {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: var(--muscle-tag-bg); border: 1px solid var(--muscle-tag-border); color: var(--purple-light);
  }

  .nutrient-focus { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; }

  .reset-btn {
    padding: 10px 16px; border-radius: 8px; background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2); color: var(--red); font-size: 12px;
    font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(239,68,68,0.2); }

  .theme-toggle {
    width: 44px; height: 24px; border-radius: 12px; cursor: pointer;
    background: var(--track); border: 1px solid var(--border); position: relative;
    transition: all 0.3s; flex-shrink: 0;
  }
  .theme-toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--blue); transition: transform 0.3s;
  }
  [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }

  .bmr-edit-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-size: 10px; padding: 3px 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .bmr-edit-btn:hover { border-color: var(--blue); color: var(--blue); }
  .bmr-override-badge {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--amber); margin-left: 6px;
  }
</style>
</head>
<body data-theme="dark">
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const MUSCLE_GROUPS = [
  { id: "chest", label: "Chest", icon: "\u25FC", nutrients: ["protein", "creatine", "leucine"], recovery: 48 },
  { id: "back", label: "Back", icon: "\u25C6", nutrients: ["protein", "magnesium", "zinc"], recovery: 48 },
  { id: "shoulders", label: "Shoulders", icon: "\u25B2", nutrients: ["protein", "vitaminD", "calcium"], recovery: 48 },
  { id: "biceps", label: "Biceps", icon: "\u25CF", nutrients: ["protein", "potassium", "b12"], recovery: 36 },
  { id: "triceps", label: "Triceps", icon: "\u25CF", nutrients: ["protein", "potassium", "b12"], recovery: 36 },
  { id: "legs", label: "Legs", icon: "\u25BC", nutrients: ["protein", "iron", "glycogen"], recovery: 72 },
  { id: "core", label: "Core", icon: "\u25C7", nutrients: ["protein", "fiber", "omega3"], recovery: 24 },
  { id: "glutes", label: "Glutes", icon: "\u25A0", nutrients: ["protein", "iron", "glycogen"], recovery: 72 },
];

const GOALS = [
  { id: "build", label: "Build Muscle", surplus: 300, proteinMult: 1.0, icon: "\u2191" },
  { id: "lean", label: "Lean Bulk", surplus: 150, proteinMult: 0.95, icon: "\u2B08" },
  { id: "maintain", label: "Maintain", surplus: 0, proteinMult: 0.85, icon: "\u2192" },
  { id: "cut", label: "Cut Fat", surplus: -400, proteinMult: 1.1, icon: "\u2193" },
  { id: "debloat", label: "Debloat + Cut", surplus: -300, proteinMult: 1.0, icon: "\u2B0A" },
];

const ACTIVITY_LEVELS = [
  { id: "sedentary", label: "Sedentary", mult: 1.2, steps: "< 4k steps" },
  { id: "light", label: "Lightly Active", mult: 1.375, steps: "4-7k steps" },
  { id: "moderate", label: "Moderately Active", mult: 1.55, steps: "7-10k steps" },
  { id: "active", label: "Very Active", mult: 1.725, steps: "10-14k steps" },
  { id: "extreme", label: "Extremely Active", mult: 1.9, steps: "14k+ steps" },
];

const DEFAULT_PROFILE = {
  age: 28, weight: 180, height: 70, sex: "male", bodyfat: 18,
  goal: "build", activity: "moderate", gymDays: 5, steps: 8000,
  todayMuscles: [], bmrOverride: null,
};

const NUTRIENT_INFO = {
  calories: { unit: "kcal", label: "Calories", color: "#F97316" },
  protein: { unit: "g", label: "Protein", color: "#3B82F6" },
  carbs: { unit: "g", label: "Carbs", color: "#EAB308" },
  fats: { unit: "g", label: "Fats", color: "#A855F7" },
  fiber: { unit: "g", label: "Fiber", color: "#22C55E" },
  sugar: { unit: "g", label: "Sugar", color: "#F43F5E" },
  sodium: { unit: "mg", label: "Sodium", color: "#EF4444" },
  potassium: { unit: "mg", label: "Potassium", color: "#14B8A6" },
  calcium: { unit: "mg", label: "Calcium", color: "#E2E8F0" },
  magnesium: { unit: "mg", label: "Magnesium", color: "#8B5CF6" },
  iron: { unit: "mg", label: "Iron", color: "#B45309" },
  zinc: { unit: "mg", label: "Zinc", color: "#6366F1" },
  vitaminD: { unit: "IU", label: "Vitamin D", color: "#FBBF24" },
  b12: { unit: "mcg", label: "B12", color: "#EC4899" },
  omega3: { unit: "g", label: "Omega-3", color: "#06B6D4" },
  creatine: { unit: "g", label: "Creatine", color: "#D946EF" },
  water: { unit: "oz", label: "Water", color: "#38BDF8" },
};

const EMPTY_INTAKE = {
  calories: 0, protein: 0, carbs: 0, fats: 0, fiber: 0, sugar: 0,
  sodium: 0, potassium: 0, calcium: 0, magnesium: 0, iron: 0, zinc: 0,
  vitaminD: 0, b12: 0, omega3: 0, creatine: 0, water: 0,
};

// ─── STORAGE ────────────────────────────────────────────────────────────────

const SK = { profile: "pq_profile", intake: "pq_intake", meals: "pq_meals", date: "pq_date", theme: "pq_theme" };

function loadState() {
  try {
    const today = new Date().toDateString();
    const savedDate = localStorage.getItem(SK.date);
    const profile = JSON.parse(localStorage.getItem(SK.profile)) || { ...DEFAULT_PROFILE };
    if (!profile.hasOwnProperty('bmrOverride')) profile.bmrOverride = null;
    if (savedDate !== today) {
      localStorage.setItem(SK.date, today);
      localStorage.removeItem(SK.intake);
      localStorage.removeItem(SK.meals);
      profile.todayMuscles = [];
      return { profile, intake: { ...EMPTY_INTAKE }, meals: [] };
    }
    return {
      profile,
      intake: JSON.parse(localStorage.getItem(SK.intake)) || { ...EMPTY_INTAKE },
      meals: JSON.parse(localStorage.getItem(SK.meals)) || [],
    };
  } catch { return { profile: { ...DEFAULT_PROFILE }, intake: { ...EMPTY_INTAKE }, meals: [] }; }
}

function loadTheme() {
  try {
    const saved = localStorage.getItem(SK.theme);
    if (saved) { document.body.setAttribute("data-theme", saved); return saved; }
  } catch {}
  return "dark";
}

function sv(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ─── CALCULATIONS (Mifflin-St Jeor, verified) ──────────────────────────────
// Male:   BMR = (10 x weight_kg) + (6.25 x height_cm) - (5 x age) + 5
// Female: BMR = (10 x weight_kg) + (6.25 x height_cm) - (5 x age) - 161

function calcBMR(p) {
  const wKg = p.weight * 0.453592;
  const hCm = p.height * 2.54;
  return p.sex === "male"
    ? 10 * wKg + 6.25 * hCm - 5 * p.age + 5
    : 10 * wKg + 6.25 * hCm - 5 * p.age - 161;
}

function calcTargets(p) {
  const calculatedBMR = calcBMR(p);
  const bmr = p.bmrOverride != null ? p.bmrOverride : calculatedBMR;
  const isMale = p.sex === "male";
  const actMult = ACTIVITY_LEVELS.find(l => l.id === p.activity)?.mult || 1.55;
  const gd = GOALS.find(g => g.id === p.goal) || GOALS[0];
  const tdee = bmr * actMult;
  const targetCal = Math.round(tdee + gd.surplus);
  const gymBonus = p.todayMuscles.length > 0 ? 0.1 : 0;
  const proteinPerLb = (isMale ? 1.0 : 0.85) * gd.proteinMult + gymBonus;
  const leanMass = p.weight * (1 - p.bodyfat / 100);
  const protein = Math.round(leanMass * proteinPerLb);
  const fatPct = (p.goal === "cut" || p.goal === "debloat") ? 0.25 : 0.28;
  const fats = Math.round((targetCal * fatPct) / 9);
  const carbs = Math.max(Math.round((targetCal - protein * 4 - fats * 9) / 4), 80);
  const isDebloat = p.goal === "debloat";
  const waterBase = Math.round(p.weight / 2);
  const waterEx = p.todayMuscles.length > 0 ? 24 : 0;
  const waterSteps = p.steps > 10000 ? 16 : p.steps > 7000 ? 8 : 0;
  const hasBig = p.todayMuscles.some(m => ["legs","back","glutes"].includes(m));

  return {
    calories: targetCal, protein, carbs, fats,
    fiber: isMale ? 38 : 25, sugar: Math.round(targetCal * 0.05 / 4),
    sodium: isDebloat ? 1500 : 2300, potassium: isDebloat ? 4700 : 3500,
    calcium: p.age > 50 ? 1200 : 1000, magnesium: isMale ? 420 : 320,
    iron: isMale ? 8 : 18, zinc: isMale ? 11 : 8,
    vitaminD: 2000, b12: 2.4, omega3: 1.6, creatine: hasBig ? 5 : 3,
    water: waterBase + waterEx + waterSteps,
    tdee: Math.round(tdee), bmr: Math.round(bmr),
    calculatedBMR: Math.round(calculatedBMR), leanMass: Math.round(leanMass),
    isOverridden: p.bmrOverride != null,
  };
}

function getSuggestions(p, t, i) {
  const s = [];
  const g = GOALS.find(x => x.id === p.goal);
  const m = p.todayMuscles;
  if (i.protein < t.protein * 0.8) s.push({ type:"critical", text:`Protein is ${Math.round(t.protein-i.protein)}g below target. Add lean chicken, fish, Greek yogurt, or a whey shake to hit ${t.protein}g.` });
  if (i.sodium > t.sodium * 1.1) s.push({ type:"warning", text:`Sodium is high (${i.sodium}mg). This causes water retention and bloating. Cut processed foods and season with herbs instead.` });
  if (i.potassium < t.potassium * 0.7) s.push({ type:"warning", text:`Low potassium hurts muscle contractions and increases bloating. Add bananas, sweet potatoes, or spinach.` });
  if (i.sugar > t.sugar * 1.2) s.push({ type:"warning", text:`Sugar is ${Math.round(i.sugar-t.sugar)}g over limit. Excess sugar spikes insulin and promotes fat storage. Swap sugary snacks for berries.` });
  if (i.water < t.water * 0.6) s.push({ type:"critical", text:`You're dehydrated. Drink at least ${t.water}oz today \u2014 especially important for ${m.length>0?"muscle recovery":"metabolism"}.` });
  if (i.fiber < t.fiber * 0.7) s.push({ type:"info", text:`Fiber aids digestion and reduces bloating. Add oats, lentils, or broccoli to reach ${t.fiber}g.` });
  if (m.includes("legs")||m.includes("glutes")) s.push({ type:"muscle", text:`Leg/Glute day: prioritize 40g+ protein within 2hrs post-workout with fast carbs (rice, banana) for glycogen replenishment.` });
  if (m.includes("chest")||m.includes("shoulders")||m.includes("triceps")) s.push({ type:"muscle", text:`Push day: ensure 5g creatine and adequate carbs pre-workout for explosive pressing power.` });
  if (m.includes("back")||m.includes("biceps")) s.push({ type:"muscle", text:`Pull day: magnesium and zinc support grip strength and recovery. Consider ZMA supplement before bed.` });
  if (i.calories>0&&i.calories<t.calories*0.6&&(p.goal==="build"||p.goal==="lean")) s.push({ type:"critical", text:`Eating too little for muscle gain! You need a surplus. Add calorie-dense foods: nuts, avocado, olive oil.` });
  if (p.goal==="debloat") s.push({ type:"info", text:`Debloat focus: keep sodium under ${t.sodium}mg, potassium above ${t.potassium}mg, drink ${t.water}oz water, and eat anti-inflammatory foods (ginger, turmeric, cucumber).` });
  if (i.omega3<t.omega3*0.5) s.push({ type:"info", text:`Omega-3s reduce inflammation and support joint health for lifting. Add salmon, walnuts, or fish oil supplement.` });
  if (i.calories===0) s.push({ type:"info", text:`Start logging your meals to get personalized nutrition suggestions based on your ${g?.label.toLowerCase()} goal.` });
  return s;
}

// ─── COMPONENTS ─────────────────────────────────────────────────────────────

function ProgressRing({ value, max, size=100, stroke=7, color, children }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(value/(max||1),1.3), off=circ*(1-pct), over=value>max;
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--track)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={over?"var(--red)":color}
          strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={Math.max(off,0)}
          strokeLinecap="round" style={{ transition:"stroke-dashoffset 0.6s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>{children}</div>
    </div>
  );
}

function NutrientCard({ id, value, target, compact }) {
  const info = NUTRIENT_INFO[id]; if (!info) return null;
  const pct = target>0?Math.round((value/target)*100):0, over=value>target*1.1, low=value<target*0.5;
  if (compact) return (
    <div className="nutrient-compact">
      <div style={{ width:8, height:8, borderRadius:"50%", background:info.color, flexShrink:0 }} />
      <span style={{ flex:1, fontSize:12, color:"var(--text-dim)" }}>{info.label}</span>
      <span className="mono" style={{ fontSize:12, fontWeight:600, color:over?"var(--red)":low?"var(--amber)":"var(--text)" }}>{value} / {target}{info.unit}</span>
    </div>
  );
  return (
    <div className="card" style={{ borderColor:"transparent" }}
      onMouseEnter={e=>e.currentTarget.style.borderColor=info.color+"44"}
      onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
        <span style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:1, color:info.color }}>{info.label}</span>
        <span className="mono" style={{ fontSize:10, color:over?"var(--red)":"var(--text-muted)" }}>{pct}%</span>
      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:8 }}>
        <span className="mono" style={{ fontSize:20, fontWeight:700, color:"var(--text-bright)" }}>{value}</span>
        <span style={{ fontSize:11, color:"var(--text-muted)" }}>/ {target} {info.unit}</span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width:`${Math.min(pct,130)}%`, background:over?"var(--red)":`linear-gradient(90deg,${info.color}88,${info.color})` }} />
      </div>
    </div>
  );
}

              <div style={{ fontSize:11, lineHeight:1.7, color:"var(--text-dim)" }}>
                <strong>Mifflin-St Jeor Equation</strong><br/>
                Male: (10 \u00D7 kg) + (6.25 \u00D7 cm) \u2212 (5 \u00D7 age) + 5<br/>
                Female: (10 \u00D7 kg) + (6.25 \u00D7 cm) \u2212 (5 \u00D7 age) \u2212 161<br/>
                <span style={{ color:"var(--text-faint)", fontSize:10 }}>
                  Your inputs: {(profile.weight*0.453592).toFixed(1)}kg \u00B7 {(profile.height*2.54).toFixed(1)}cm \u00B7 {profile.age}yrs<br/>
                  = (10\u00D7{(profile.weight*0.453592).toFixed(1)}) + (6.25\u00D7{(profile.height*2.54).toFixed(1)}) \u2212 (5\u00D7{profile.age}) {profile.sex==="male"?"+ 5":"\u2212 161"} = <strong>{targets.calculatedBMR} kcal</strong>
                </span>
              </div>
              {targets.isOverridden && <div style={{ marginTop:8, fontSize:11, color:"var(--amber)" }}>You are using a custom BMR of {targets.bmr} kcal. All targets are based on this override.</div>}
            </div>

            <div className="label">Appearance</div>
            <div className="flex-row" style={{ gap:12, marginBottom:30 }}>
              <span style={{ fontSize:13, color:"var(--text-dim)", flex:1 }}>{theme==="dark"?"\uD83C\uDF19 Dark Mode":"\u2600\uFE0F Light Mode"}</span>
              <button className="theme-toggle" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} aria-label="Toggle theme" />
            </div>
          </div>
        )}
      </div>

      {/* Nav */}
      <div className="nav">
        {[{id:"dashboard",label:"Dashboard",icon:"\u25C9"},{id:"log",label:"Log Meal",icon:"+"},{id:"muscles",label:"Muscles",icon:"\u25C6"},{id:"profile",label:"Profile",icon:"\u2699"}].map(t=>(
          <button key={t.id} className={`nav-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
